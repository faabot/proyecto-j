<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="candado.css">
</head>
<body>

    <div class="contenedor-candado">
        
        <div class="libro-abierto">
            
            <div class="pagina-izquierda">
                <img src="https://picsum.photos/id/1062/300/400" alt="Nuestra foto especial">
            </div>

            <div class="pagina-derecha">
                <h2>Mi querida Julietita... ❤️</h2>
                <p>Has llegado al final de este pequeño mundo virtual que programé especialmente para ti.</p>
                <p>Eres lo más lindo que me ha pasado y quiero hacerte una pregunta muy importante:</p>
                <h3 class="pregunta-final">¿Quieres pololear conmigo?</h3>
                
                <div class="botones-candado">
                    <button id="btn-si" onclick="alert('¡Dijo que SÍ! 🎉❤️ Te amo.')">Sí, obvio 🥰</button>
                    <button id="btn-no" onmouseover="escaparBoton()">No 😢</button>
                </div>
            </div>

        </div>

    </div>

    <script src="candado.js"></script>
</body>
</html>
