<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Pro 🍅</title>
    <link rel="stylesheet" href="pomodoro.css">
</head>
<body>

    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>

    <div class="pomodoro-container">
        <h1 id="titulo-pomodoro">Tiempo de Estudio ❤️</h1>
        <p id="subtitulo-pomodoro">Concentración preciosa, ojo piojo.</p>

        <div id="reloj-pantalla" class="reloj">
            <span id="minutos">25</span>:<span id="segundos">00</span>
        </div>

        <div class="botones">
            <button id="btn-iniciar" onclick="iniciarCronometro()">Iniciar</button>
            <button id="btn-pausar" onclick="pausarCronometro()">Pausar</button>
            <button id="btn-reiniciar" onclick="reiniciarCronometro()">Reiniciar</button>
        </div>

        <div class="configuracion">
                    <h3>⚙️ Ajustes</h3>
                    <label>Minutos Estudio: <input type="number" id="pomo-estudio" value="25"></label>
                    <label>Minutos Descanso Corto: <input type="number" id="pomo-corto" value="5"></label>
                    <label>Minutos Descanso Largo: <input type="number" id="pomo-largo" value="15"></label>
                    <label>Ciclos antes del descanso largo: <input type="number" id="pomo-intervalo" value="4"></label>
                    
                    <div style="margin-top: 10px;">
                        <label><input type="checkbox" id="auto-descanso"> Auto-iniciar descansos</label><br>
                        <label><input type="checkbox" id="auto-pomo"> Auto-iniciar pomodoros</label>
                    </div>
                    
                    <button class="btn-aplicar-pomo" onclick="aplicarConfigPomo()">Aplicar Ajustes</button>
                </div>
            </div>

    <script src="pomodoro.js"></script>
</body>
</html>
