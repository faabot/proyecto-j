<!DOCTYPE html>
<html lang="es">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nuestro Rincón ❤️</title>
    <link rel="stylesheet" href="rincon.css">
    <script src="rincon.js?v=3.2.1"></script>
</head>
<body>

    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>

    <div class="contenedor-libro">
        <div class="libro">
            
            <div class="papel tapa" id="p1">
                <div class="frente">
                    <img src="img/portada_fin.jpg" alt="Portada">
                </div>
                <div class="dorso">
                    <img src="img/1.png" alt="Interior Portada">
                </div>
            </div>

            <div class="papel" id="p2">
                <div class="frente"><img src="img/2.png" alt="Foto 1"></div>
                <div class="dorso"><img src="img/3.png" alt="Foto 2"></div>
            </div>

            <div class="papel" id="p3">
                <div class="frente"><img src="img/4.png" alt="Foto 3"></div>
                <div class="dorso"><img src="img/5.jpeg" alt="Foto 4"></div>
            </div>

            <div class="papel" id="p4">
                <div class="frente"><img src="img/6.jpeg" alt="Foto 5"></div>
                <div class="dorso"><img src="img/7.png" alt="Foto 6"></div>
            </div>


            <div class="papel tapa" id="p5">
                <div class="frente">
                    <img src="img/8.png" alt="Imagen Fin">
                </div>
                <div class="dorso">
                    <img src="img/portada_fin.jpg" alt="Contraportada Exterior">
                </div>
            </div>

        </div>
    </div>

    <script src="rincon.js"></script>
</body>
</html>
