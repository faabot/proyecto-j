<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nuestro Espacio </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="app-container">

        <div class="widget-hero">
            <div class="hero-header">
                <span class="hero-icon">💌</span>
                <h3>Mensaje Diario plop</h3>
            </div>
            <p class="hero-texto" id="texto-mensaje-diario">"Buenos días, mi amor. ¡Que hoy sea un día increíble para ti!"</p>
        </div>

        <div class="dashboard-grid">
            
            <a href="calculadora.html" class="widget-btn">
                <div class="icon-box color-1">🎓</div>
                <span>Calculadora</span>
            </a>

            <a href="pomodoro.html" class="widget-btn">
                <div class="icon-box color-2">🍅</div>
                <span>Pomodoro</span>
            </a>

            <a href="rincon.html" class="widget-btn">
                <div class="icon-box color-3">
                    <img src="img/corazon.png" alt="Corazón">
                </div>
                <span>Rincón 3D</span>
            </a>

            <a href="lector_qr.html" class="widget-btn">
                <div class="icon-box color-4">📷</div>
                <span>Lector QR</span>
            </a>

            <a href="arbol.html" class="widget-btn widget-full">
                <div class="icon-box color-5">🌳</div>
                <span>Nuestro Tiempo</span>
            </a>

        </div>

    </div> 
    
    <div class="contenedor-candado">
        <button id="btn-candado" onclick="abrirModal('modal-password')" title="Secreto 🤫">🔒</button>
    </div>

    <div id="modal-password" class="modal-oculto">
        <div class="modal-contenido">
            <span class="cerrar-modal" onclick="cerrarModal('modal-password')">&times;</span>
            <h3 style="color: #d6336c;">Código Secreto 🔐</h3>
            <p style="color: #666; font-size: 14px;">Ingresar contraseña:</p>
            
            <input type="password" id="input-clave" placeholder="****">
            <button class="btn-verificar" onclick="verificarClave()">Desbloquear</button>
            
            <p id="error-clave" style="display: none; color: #e53e3e; font-size: 13px; margin-top: 10px;">
                Código incorrecto. ¡Sigue buscando! 🕵️‍♀️
            </p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registrado', reg))
                .catch(err => console.log('Error SW:', err));
            });
        }
    </script>

    <script src="candado.js"></script>



    <div class="version-app">v3.3</div>
</body>
</html>
