<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Pomodoro Favorito</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="pomodoro-container">
        <h1>Tiempo de Enfoque ❤️</h1>
        <p>¡A romperla hoy! Concentración al máximo.</p>

        <div class="configuracion">
            <input type="number" id="input-minutos" value="25" min="1" max="120" title="Ingresa los minutos">
            <button id="btn-aplicar" onclick="aplicarTiempo()">Aplicar</button>
        </div>

        <div class="reloj">
            <span id="minutos">25</span>:<span id="segundos">00</span>
        </div>

        <div class="botones">
            <button id="btn-iniciar" onclick="iniciarCronometro()">Iniciar</button>
            <button id="btn-pausar" onclick="pausarCronometro()">Pausar</button>
            <button id="btn-reiniciar" onclick="reiniciarCronometro()">Reiniciar</button>
        </div>
    </div>

    <script>
        let tiempoInicial = 25 * 60; // 25 minutos por defecto
        let tiempoRestante = tiempoInicial;
        let idIntervalo = null;

        const minutosPantalla = document.getElementById("minutos");
        const segundosPantalla = document.getElementById("segundos");
        const inputMinutos = document.getElementById("input-minutos"); // Conectamos la cajita de texto

        function actualizarPantalla() {
            let min = Math.floor(tiempoRestante / 60);
            let seg = tiempoRestante % 60;

            minutosPantalla.textContent = min < 10 ? "0" + min : min;
            segundosPantalla.textContent = seg < 10 ? "0" + seg : seg;
        }

        // NUEVA FUNCIÓN: Lee el input y cambia el reloj
        function aplicarTiempo() {
            let nuevosMinutos = parseInt(inputMinutos.value);
            
            // Verificamos que no hayan escrito letras o números negativos
            if (isNaN(nuevosMinutos) || nuevosMinutos <= 0) {
                alert("Por favor, ingresa un número de minutos válido mayor a 0.");
                return;
            }

            tiempoInicial = nuevosMinutos * 60; // Convertimos a segundos
            pausarCronometro(); // Si estaba corriendo, lo pausamos
            tiempoRestante = tiempoInicial; // Reseteamos con el nuevo tiempo
            actualizarPantalla();
        }

        function iniciarCronometro() {
            if (idIntervalo !== null) return;

            idIntervalo = setInterval(() => {
                if (tiempoRestante > 0) {
                    tiempoRestante--;
                    actualizarPantalla();
                } else {
                    clearInterval(idIntervalo);
                    idIntervalo = null;
                    alert("¡Tiempo cumplido! Hora de un merecido descanso, mi amor. 🥰");
                }
            }, 1000);
        }

        function pausarCronometro() {
            clearInterval(idIntervalo);
            idIntervalo = null;
        }

        function reiniciarCronometro() {
            pausarCronometro();
            tiempoRestante = tiempoInicial;
            actualizarPantalla();
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registro => console.log('Service Worker registrado con éxito', registro))
                .catch(error => console.log('Error al registrar:', error));
            });
        }
    </script>
</body>
</html>
