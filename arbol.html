<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nuestro Tiempo ❤️</title>
    <link rel="stylesheet" href="arbol.css">
</head>
<body>

    <a href="index.html" class="btn-volver">⬅ Volver</a>

    <div class="tarjeta-amor arbol-centrado" id="tarjeta-principal">
        
        <div class="panel-izquierdo">
            <div class="contenido-texto">
                <div id="carta-maquina"></div>
                
                <div class="contenedor-reloj">
                    <p class="titulo-reloj">Mi amor por ti comenzó hace...</p>
                    <p class="reloj-numeros">
                        <span id="d">00</span> días 
                        <span id="h">00</span> horas 
                        <span id="m">00</span> minutos 
                        <span id="s">00</span> segundos
                    </p>
                </div>
            </div>
        </div>

        <div class="panel-derecho">
            <div class="escenario-arbol">
                <div class="semilla-roja" id="semilla"></div>
                
                <svg class="arbol-verde" viewBox="0 0 300 300" id="svg-arbol">
                    <path class="trazo-verde tronco" d="M150,280 Q150,200 150,100" />
                    <path class="trazo-verde rama" d="M150,220 Q110,180 80,140" />
                    <path class="trazo-verde rama" d="M150,180 Q190,140 220,100" />
                    <path class="trazo-verde rama" d="M150,140 Q120,100 100,60" />
                    <path class="trazo-verde rama" d="M150,120 Q180,80 200,40" />
                </svg>
                
                <div id="copa-corazon"></div>
            </div>
        </div>

        <div class="linea-suelo"></div>
    </div>

    <script src="arbol.js"></script>
</body>
</html>
