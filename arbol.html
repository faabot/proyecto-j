<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Tiempo ❤️</title>
    <link rel="stylesheet" href="arbol.css">
</head>
<body>

    <a href="index.html" class="btn-volver">⬅ Volver al Menú</a>

    <div class="contenedor-principal">
        
        <div class="contenedor-principal arbol-centrado">

        </div>

        <div class="panel-texto">
            <div class="contenido-texto">
                <div id="carta-maquina">
                    </div>
                
                <div class="contenedor-contador">
                    <p class="titulo-contador">Mi amor por ti comenzó hace...</p>
                    <div id="reloj-amor">
                        <span id="dias">00</span> días 
                        <span id="horas">00</span> horas 
                        <span id="minutos">00</span> minutos 
                        <span id="segundos">00</span> segundos
                    </div>
                </div>
            </div>
        </div>

        <div class="panel-arbol">
            <div id="arbol">
                
                <div class="semilla">🌱</div>

                <div id="copa-arbol"></div>

                <svg class="arbol-svg" viewBox="0 0 200 300">
                    <path class="trazo-arbol tronco-svg" d="M100,300 C85,200 115,120 100,60" />
                    
                    <path class="trazo-arbol rama-izq-svg" d="M103,160 C70,140 40,130 30,90" />
                    
                    <path class="trazo-arbol rama-der-svg" d="M98,120 C130,100 160,110 170,70" />
                </svg>

            </div>
        </div>

    </div>

    <script src="arbol.js"></script>
</body>
</html>
